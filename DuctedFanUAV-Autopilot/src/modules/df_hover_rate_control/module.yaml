module_name: df_hover_rate_control
parameters:
- group: Ducted Fan Rate Control
  definitions:
    DF_ROLLRATE_P:
      description:
        short: Roll rate P gain
        long: Roll rate proportional gain, i.e. control output for angular speed error 1 rad/s.
      type: float
      default: 0.15
      min: 0.01
      max: 0.5
      decimal: 3
      increment: 0.01
    DF_ROLLRATE_I:
      description:
        short: Roll rate I gain
        long: Roll rate integral gain. Can be set to compensate static thrust difference or gravity center offset.
      type: float
      default: 0.2
      min: 0.0
      decimal: 3
      increment: 0.01
    DF_RR_INT_LIM:
      description:
        short: Roll rate integrator limit
        long: Roll rate integrator limit. Can be set to increase the amount of integrator available to counteract disturbances or reduced to improve settling time after large roll moment trim changes.
      type: float
      default: 0.3
      min: 0.0
      decimal: 2
      increment: 0.01
    DF_ROLLRATE_D:
      description:
        short: Roll rate D gain
        long: Roll rate differential gain. Small values help reduce fast oscillations. If value is too big oscillations will appear again.
      type: float
      default: 0.003
      min: 0.0
      max: 0.01
      decimal: 4
      increment: 0.0005
    DF_ROLLRATE_FF:
      description:
        short: Roll rate feedforward
        long: Improves tracking performance.
      type: float
      default: 0.0
      min: 0.0
      decimal: 4
    DF_ROLLRATE_K:
      description:
        short: Roll rate controller gain
        long: |-
          Global gain of the controller.

          This gain scales the P, I and D terms of the controller:
          ```
          output = DF_ROLLRATE_K * (DF_ROLLRATE_P * error
          + DF_ROLLRATE_I * error_integral
          + DF_ROLLRATE_D * error_derivative)
          ```
          Set DF_ROLLRATE_P=1 to implement a PID in the ideal form.
          Set DF_ROLLRATE_K=1 to implement a PID in the parallel form.
      type: float
      default: 1.0
      min: 0.01
      max: 5.0
      decimal: 4
      increment: 0.0005
    DF_PITCHRATE_P:
      description:
        short: Pitch rate P gain
        long: Pitch rate proportional gain, i.e. control output for angular speed error 1 rad/s.
      type: float
      default: 0.15
      min: 0.01
      max: 0.6
      decimal: 3
      increment: 0.01
    DF_PITCHRATE_I:
      description:
        short: Pitch rate I gain
        long: Pitch rate integral gain. Can be set to compensate static thrust difference or gravity center offset.
      type: float
      default: 0.2
      min: 0.0
      decimal: 3
      increment: 0.01
    DF_PR_INT_LIM:
      description:
        short: Pitch rate integrator limit
        long: Pitch rate integrator limit. Can be set to increase the amount of integrator available to counteract disturbances or reduced to improve settling time after large pitch moment trim changes.
      type: float
      default: 0.3
      min: 0.0
      decimal: 2
      increment: 0.01
    DF_PITCHRATE_D:
      description:
        short: Pitch rate D gain
        long: Pitch rate differential gain. Small values help reduce fast oscillations. If value is too big oscillations will appear again.
      type: float
      default: 0.003
      min: 0.0
      decimal: 4
      increment: 0.0005
    DF_PITCHRATE_FF:
      description:
        short: Pitch rate feedforward
        long: Improves tracking performance.
      type: float
      default: 0.0
      min: 0.0
      decimal: 4
    DF_PITCHRATE_K:
      description:
        short: Pitch rate controller gain
        long: |-
          Global gain of the controller.

          This gain scales the P, I and D terms of the controller:
          ```
          output = DF_PITCHRATE_K * (DF_PITCHRATE_P * error
          + DF_PITCHRATE_I * error_integral
          + DF_PITCHRATE_D * error_derivative)
          ```
          Set DF_PITCHRATE_P=1 to implement a PID in the ideal form.
          Set DF_PITCHRATE_K=1 to implement a PID in the parallel form.
      type: float
      default: 1.0
      min: 0.01
      max: 5.0
      decimal: 4
      increment: 0.0005
    DF_YAWRATE_P:
      description:
        short: Yaw rate P gain
        long: Yaw rate proportional gain, i.e. control output for angular speed error 1 rad/s.
      type: float
      default: 0.2
      min: 0.0
      max: 0.6
      decimal: 3
      increment: 0.01
    DF_YAWRATE_I:
      description:
        short: Yaw rate I gain
        long: Yaw rate integral gain. Can be set to compensate static thrust difference or gravity center offset.
      type: float
      default: 0.1
      min: 0.0
      decimal: 3
      increment: 0.01
    DF_YR_INT_LIM:
      description:
        short: Yaw rate integrator limit
        long: Yaw rate integrator limit. Can be set to increase the amount of integrator available to counteract disturbances or reduced to improve settling time after large yaw moment trim changes.
      type: float
      default: 0.3
      min: 0.0
      decimal: 2
      increment: 0.01
    DF_YAWRATE_D:
      description:
        short: Yaw rate D gain
        long: Yaw rate differential gain. Small values help reduce fast oscillations. If value is too big oscillations will appear again.
      type: float
      default: 0.0
      min: 0.0
      decimal: 4
      increment: 0.0005
    DF_YAWRATE_FF:
      description:
        short: Yaw rate feedforward
        long: Improves tracking performance.
      type: float
      default: 0.0
      min: 0.0
      decimal: 4
    DF_YAWRATE_K:
      description:
        short: Yaw rate controller gain
        long: |-
          Global gain of the controller.

          This gain scales the P, I and D terms of the controller:
          ```
          output = DF_YAWRATE_K * (DF_YAWRATE_P * error
          + DF_YAWRATE_I * error_integral
          + DF_YAWRATE_D * error_derivative)
          ```
          Set DF_YAWRATE_P=1 to implement a PID in the ideal form.
          Set DF_YAWRATE_K=1 to implement a PID in the parallel form.
      type: float
      default: 1.0
      min: 0.01
      max: 5.0
      decimal: 4
      increment: 0.0005
    DF_BAT_SCALE_EN:
      description:
        short: Battery power level scaler
        long: |-
          This compensates for voltage drop of the battery over time by attempting to
          normalize performance across the operating range of the battery.
      type: boolean
      default: 0
    DF_YAW_TQ_CUTOFF:
      description:
        short: Low pass filter cutoff frequency for yaw torque setpoint
        long: |-
          Reduces vibrations by lowering high frequency torque caused by rotor acceleration.
          0 disables the filter.
      type: float
      default: 2.0
      min: 0
      max: 10
      unit: Hz
      decimal: 3
- group: Ducted Fan Acro Mode
  definitions:
    DF_ACRO_R_MAX:
      description:
        short: Acro mode maximum roll rate
        long: Full stick deflection leads to this rate.
      type: float
      default: 100.0
      unit: deg/s
      min: 0.0
      max: 1800.0
      decimal: 1
      increment: 5
    DF_ACRO_P_MAX:
      description:
        short: Acro mode maximum pitch rate
        long: Full stick deflection leads to this rate.
      type: float
      default: 100.0
      unit: deg/s
      min: 0.0
      max: 1800.0
      decimal: 1
      increment: 5
    DF_ACRO_Y_MAX:
      description:
        short: Acro mode maximum yaw rate
        long: Full stick deflection leads to this rate.
      type: float
      default: 100.0
      unit: deg/s
      min: 0.0
      max: 1800.0
      decimal: 1
      increment: 5
    DF_ACRO_EXPO:
      description:
        short: Acro mode roll, pitch expo factor
        long: |-
          Exponential factor for tuning the input curve shape.

          0 Purely linear input curve
          1 Purely cubic input curve
      type: float
      default: 0.0
      min: 0
      max: 1
      decimal: 2
    DF_ACRO_EXPO_Y:
      description:
        short: Acro mode yaw expo factor
        long: |-
          Exponential factor for tuning the input curve shape.

          0 Purely linear input curve
          1 Purely cubic input curve
      type: float
      default: 0.0
      min: 0
      max: 1
      decimal: 2
    DF_ACRO_SUPEXPO:
      description:
        short: Acro mode roll, pitch super expo factor
        long: |-
          "Superexponential" factor for refining the input curve shape tuned using DF_ACRO_EXPO.

          0 Pure Expo function
          0.7 reasonable shape enhancement for intuitive stick feel
          0.95 very strong bent input curve only near maxima have effect
      type: float
      default: 0.0
      min: 0
      max: 0.95
      decimal: 2
    DF_ACRO_SUPEXPOY:
      description:
        short: Acro mode yaw super expo factor
        long: |-
          "Superexponential" factor for refining the input curve shape tuned using DF_ACRO_EXPO_Y.

          0 Pure Expo function
          0.7 reasonable shape enhancement for intuitive stick feel
          0.95 very strong bent input curve only near maxima have effect
      type: float
      default: 0.0
      min: 0
      max: 0.95
      decimal: 2
- group: Ducted Fan Rate INDI
  definitions:
    DF_INDI_R_P:
      description:
        short: INDI roll rate proportional gain
        long: Physical rate-error gain used before conversion to the normalized allocation coordinates published by control_allocator.
      type: float
      default: 10.0
      min: 0
      decimal: 3
    DF_INDI_P_P:
      description:
        short: INDI pitch rate proportional gain
        long: Physical rate-error gain used before conversion to the normalized allocation coordinates published by control_allocator.
      type: float
      default: 10.0
      min: 0
      decimal: 3
    DF_INDI_Y_P:
      description:
        short: INDI yaw rate proportional gain
        long: Physical rate-error gain used before conversion to the normalized allocation coordinates published by control_allocator.
      type: float
      default: 10.0
      min: 0
      decimal: 3
    DF_USE_INDI:
      description:
        short: Enable INDI rate control
        long: |-
          When enabled, df_hover_rate_control publishes the sum of INDI feedback and
          rate-error feedback as the normalized torque setpoint.

          The controller only enters the INDI branch when allocation_value instance 1
          provides recent complete roll, pitch, and yaw torque authority. Otherwise
          df_hover_rate_control falls back to the standard rate controller for that cycle.
      type: boolean
      default: 0
    DF_USE_TAUI:
      description:
        short: Enable INDI angular acceleration feedback
      type: boolean
      default: 1
    DF_USE_U:
      description:
        short: Enable INDI actuator feedback term
      type: boolean
      default: 1
